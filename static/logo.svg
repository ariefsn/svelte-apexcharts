<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="svelte-apexcharts logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="sTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3E00"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0081CB"/>
      <stop offset="100%" stop-color="#00C6FF"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#008FFB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#008FFB" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Chart area fill (clipped to rounded rect) -->
  <g clip-path="url(#clip)">
    <path d="M 48,470 L 48,368 C 110,338 168,306 228,284 C 298,258 368,238 464,198 L 464,470 Z"
          fill="url(#areaFill)"/>

    <!-- Chart line -->
    <path d="M 48,368 C 110,338 168,306 228,284 C 298,258 368,238 464,198"
          fill="none"
          stroke="url(#chartLine)"
          stroke-width="11"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.65"/>

    <!-- Chart dots -->
    <circle cx="158" cy="320" r="9" fill="url(#chartLine)" opacity="0.65"/>
    <circle cx="268" cy="274" r="9" fill="url(#chartLine)" opacity="0.65"/>
    <circle cx="378" cy="228" r="9" fill="url(#chartLine)" opacity="0.65"/>
  </g>

  <!-- Svelte S — two C-curve arcs forming the S spine -->
  <!-- Upper bowl: sweeps top of S from lower-right through top-center to lower-left, then curves to middle -->
  <path d="M 308,148
           C 308,102 284,74 256,74
           C 228,74 204,102 204,148
           C 204,188 228,212 256,234
           C 284,256 308,282 308,328
           C 308,374 284,438 256,438
           C 228,438 204,374 204,328"
        fill="none"
        stroke="url(#sTop)"
        stroke-width="54"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
